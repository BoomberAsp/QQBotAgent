# SearXNG configuration for QQBot Agent
# Optimized for access from mainland China

use_default_settings: true

general:
  instance_name: "QQBot Search"

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

server:
  secret_key: "qqbot-agent-searxng-secret-change-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  # Allow search API access from any host (internal service)
  public_instance: false

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: zh-Hans-CN

# Engines: prioritized for access from mainland China
# - bing / bing_news: primary, stable from China
# - duckduckgo: fallback, intermittent (short timeout)
# - mwmbl: independent index, no API key, small but free
engines:
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    timeout: 10.0

  - name: bing news
    engine: bing_news
    shortcut: bin
    disabled: false
    timeout: 10.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
    timeout: 6.0

  - name: mwmbl
    engine: mwmbl
    shortcut: mw
    disabled: false
    timeout: 5.0

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  # Retry once on upstream failure (catches intermittent Bing timeouts)
  retries: 1
